<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Minimal</title>
<style>
  body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f0f0; }
  .flashcard { width: 300px; height: 200px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 24px; user-select: none; }
</style>
</head>
<body>

<div id="flashcard" class="flashcard"></div>

<script>
// --- SIMPLE FLASHCARDS DATA ---
const flashcards = [
  "Card 1: Question A",
  "Card 2: Question B",
  "Card 3: Question C",
  "Card 4: Question D"
];

let currentIndex = 0;
const cardDiv = document.getElementById("flashcard");

// --- FUNCTION TO SHOW CURRENT CARD ---
function showCard() {
  cardDiv.textContent = flashcards[currentIndex];
}

// --- SHOW INITIAL CARD ---
showCard();

// --- SWIPE LOGIC ---
let startX = 0;

cardDiv.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
}, { passive: true });

cardDiv.addEventListener("touchend", (e) => {
  const endX = e.changedTouches[0].clientX;
  const deltaX = endX - startX;
  const threshold = 50;

  if (Math.abs(deltaX) > threshold) {
    // swipe right or left → next card
    currentIndex = (currentIndex + 1) % flashcards.length;
    showCard();
  }
}, { passive: true });
</script>

</body>
</html>
