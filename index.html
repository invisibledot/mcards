<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Multi-Sheet + SM-2</title>
<script src="config.js"></script>
<link rel="stylesheet" href="flashcards.css">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
</head>
<body>

<!-- MENU -->
<div id="menu">
  <h2>Select a Flashcard Set</h2>
  <div id="setList"></div>
</div>

<!-- FLASHCARD AREA -->
<div id="flashcardArea" class="hidden neutral">
  <button id="backToMenu">← Back</button>

  <div id="flashcard" class="flashcard">
    <div class="card-inner">
      <div class="card-front"></div>
      <div class="card-back">
        <div class="answer-text"></div>
        <div class="extra"></div>
      </div>
    </div>
  </div>

  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <div id="score"></div>
</div>

<script>
const SPREADSHEET_ID = CONFIG.SPREADSHEET_ID;
const API_KEY = CONFIG.API_KEY;

// DOM references
const menuDiv = document.getElementById("menu");
const flashcardArea = document.getElementById("flashcardArea");
const backBtn = document.getElementById("backToMenu");
const setList = document.getElementById("setList");
const card = document.getElementById("flashcard");
const inner = card.querySelector(".card-inner");
const frontDiv = card.querySelector(".card-front");
const backDiv = card.querySelector(".card-back");
const answerDiv = backDiv.querySelector(".answer-text");
const extraDiv = backDiv.querySelector(".extra");
const scoreDiv = document.getElementById("score");
const progressBar = document.getElementById("progressBar");

// STATE
let flashcards = [];
let currentIndex = 0;
let cardData = {};
let storageKey = "";
let statsKey = "";
let isFlipped = false;
let sessionTotalDue = 0;

// --- STATISTICS ---
let sessionStats = { reviewed: 0, correct: 0, incorrect: 0 };
let lifetimeStats = { reviewed: 0, correct: 0, incorrect: 0 };

// --- SWIPE VARIABLES ---
let startX = 0, currentX = 0, isDragging = false;
const threshold = 120;
const maxRotation = 25;
const maxTranslate = window.innerWidth * 0.8;

// --- CARD FLIP ---
card.addEventListener("click", () => {
  if (!isDragging) {
    card.classList.toggle("flipped");
    isFlipped = !isFlipped;
  }
});

// --- POINTER SWIPE ---
card.addEventListener("pointerdown", e => {
  startX = e.clientX;
  isDragging = true;
  card.setPointerCapture(e.pointerId);
});

card.addEventListener("pointermove", e => {
  if (!isDragging) return;
  currentX = e.clientX;
  const deltaX = currentX - startX;
  const rotate = (deltaX / window.innerWidth) * maxRotation;
  inner.style.transform = `translateX(${deltaX}px) rotate(${rotate}deg)`;

  const intensity = Math.min(Math.abs(deltaX) / threshold, 1);
  if (deltaX > 0)
    flashcardArea.style.background = `rgba(76,175,80,${0.15 + 0.35*intensity})`;
  else if (deltaX < 0)
    flashcardArea.style.background = `rgba(244,67,54,${0.15 + 0.35*intensity})`;
});

card.addEventListener("pointerup", e => {
  if (!isDragging) return;
  isDragging = false;

  const deltaX = e.clientX - startX;

  if (deltaX > threshold) flyCard("right");
  else if (deltaX < -threshold) flyCard("left");
  else snapBack();

  setTimeout(() => flashcardArea.style.background = "", 300);
});

function flyCard(direction) {
  const translate = direction === "right" ? maxTranslate : -maxTranslate;
  const rotate = direction === "right" ? maxRotation : -maxRotation;

  inner.style.transition = "transform 0.4s ease-out";
  inner.style.transform = `translateX(${translate}px) rotate(${rotate}deg)`;

  setTimeout(() => {
    resetCardPosition();
    direction === "right" ? markCorrect() : markIncorrect();
  }, 400);
}

function snapBack() {
  inner.style.transition = "transform 0.3s ease";
  inner.style.transform = "";
  setTimeout(resetCardPosition, 300);
}

function resetCardPosition() {
  inner.style.transition = "none";
  inner.style.transform = "";
}

// --- SM-2 ---
function initializeCard(c){
  if(!cardData[c.front])
    cardData[c.front] = { repetition:0, interval:0, ease:2.5, due:Date.now() };
}

function markCorrect(){
  const c = flashcards[currentIndex], d = cardData[c.front];
  d.repetition++;
  d.interval = d.repetition===1?1:d.repetition===2?3:Math.round(d.interval*d.ease);
  d.due = Date.now() + d.interval*86400000;

  sessionStats.reviewed++;
  sessionStats.correct++;
  lifetimeStats.reviewed++;
  lifetimeStats.correct++;

  saveAll();
  nextCard();
}

function markIncorrect(){
  const c = flashcards[currentIndex], d = cardData[c.front];
  d.repetition = 0;
  d.interval = 1;
  d.due = Date.now() + 86400000;

  sessionStats.reviewed++;
  sessionStats.incorrect++;
  lifetimeStats.reviewed++;
  lifetimeStats.incorrect++;

  saveAll();
  nextCard();
}

function nextCard(){
  updateProgressBar();

  const now = Date.now();
  const dueCards = flashcards.filter(c=>{
    initializeCard(c);
    return cardData[c.front].due <= now;
  });

  if(dueCards.length===0){ showNoCardsMessage(); return; }

  const random = dueCards[Math.floor(Math.random()*dueCards.length)];
  currentIndex = flashcards.findIndex(c=>c.front===random.front);
  showCard();
}

function showCard(){
  const c = flashcards[currentIndex];
  initializeCard(c);
  frontDiv.textContent = c.front;
  answerDiv.textContent = c.back;
  extraDiv.textContent = c.note || "";
  card.classList.remove("flipped");
  isFlipped = false;
  updateStatsUI();
}

function showNoCardsMessage(){
  progressBar.style.width = "100%";
  frontDiv.textContent = "🎉 All done!";
  answerDiv.textContent = "No cards due right now.";
  extraDiv.textContent = "";
}

// --- PROGRESS BAR ---
function updateProgressBar(){
  if(sessionTotalDue === 0){
    progressBar.style.width = "100%";
    return;
  }
  const progress = Math.min(sessionStats.reviewed / sessionTotalDue, 1);
  progressBar.style.width = `${progress*100}%`;
}

// --- STATS UI ---
function updateStatsUI(){
  const sessionAcc = sessionStats.reviewed
    ? Math.round((sessionStats.correct/sessionStats.reviewed)*100)
    : 0;

  const lifetimeAcc = lifetimeStats.reviewed
    ? Math.round((lifetimeStats.correct/lifetimeStats.reviewed)*100)
    : 0;

  scoreDiv.innerHTML = `
    <strong>Session:</strong> ${sessionStats.reviewed} |
    🎯 ${sessionAcc}% 
    <br>
    <strong>All-time:</strong> ${lifetimeStats.reviewed} |
    🎯 ${lifetimeAcc}%
  `;
}

function saveAll(){
  localStorage.setItem(storageKey, JSON.stringify(cardData));
  localStorage.setItem(statsKey, JSON.stringify(lifetimeStats));
}

// --- LOAD SHEETS ---
async function loadSheetNames(){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}?fields=sheets(properties(title))&key=${API_KEY}`;
  const res = await fetch(url);
  const json = await res.json();
  (json.sheets||[]).forEach(s=>{
    const btn = document.createElement("button");
    btn.textContent = s.properties.title;
    btn.className = "set-button";
    btn.onclick = () => selectSheet(s.properties.title);
    setList.appendChild(btn);
  });
}

function selectSheet(sheetName){
  storageKey = `sm2Data-${sheetName}`;
  statsKey = `stats-${sheetName}`;

  cardData = JSON.parse(localStorage.getItem(storageKey)) || {};
  lifetimeStats = JSON.parse(localStorage.getItem(statsKey)) || {reviewed:0,correct:0,incorrect:0};
  sessionStats = {reviewed:0,correct:0,incorrect:0};

  progressBar.style.width = "0%";

  menuDiv.classList.add("hidden");
  flashcardArea.classList.remove("hidden");

  loadFlashcardsFromSheet(sheetName);
}

async function loadFlashcardsFromSheet(sheetName){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${sheetName}?key=${API_KEY}`;
  const res = await fetch(url);
  const json = await res.json();
  const rows = json.values || [];

  flashcards = rows
    .filter(r=>r.length>=2)
    .map(r=>({front:r[0].trim(),back:r[1].trim(),note:r[2]?r[2].trim():""}));

  flashcards.forEach(initializeCard);

  const now = Date.now();
  sessionTotalDue = flashcards.filter(c=>cardData[c.front].due <= now).length;

  updateProgressBar();
  nextCard();
}

backBtn.addEventListener("click",()=>{
  menuDiv.classList.remove("hidden");
  flashcardArea.classList.add("hidden");
  progressBar.style.width = "0%";
});

loadSheetNames();
</script>
</body>
</html>
