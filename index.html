<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Multi-Set + SM-2</title>
<link rel="stylesheet" href="flashcards.css">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
</head>
<body>

<!-- Menu -->
<div id="menu">
  <h2>Select Flashcard Set:</h2>
  <select id="setSelector">
    <option value="" selected disabled>Select a flashcard set...</option>
  </select>
</div>

<!-- Flashcard area -->
<div id="flashcardArea" class="hidden">
  <button id="backToMenu">← Back to Menu</button>
    <div id="flashcard" class="flashcard">
      <div class="card-inner">
        <div class="card-front"></div>
        <div class="card-back">
          <div class="answer-text"></div>
          <div class="extra"></div>
        </div>
      </div>
    </div>
  <div id="score"></div>
</div>

<script>
// --- CONFIG ---
const SPREADSHEET_ID = "1Qi7v0SdLPNeXWnNXu_taQcl0UfST1nVDJoBH0HXi_QE";
const API_KEY = "AIzaSyDySSVjnljTxz1qvAhvUzHmbzF0eC8GVIQ";

const flashcardSets = {
  "Swedish Verbs A1": "SwedishVerbsA1",
  "Swedish Preterite A1": "SwedishPreteriteA1"
};

// --- DOM ---
const menuDiv = document.getElementById("menu");
const flashcardArea = document.getElementById("flashcardArea");
const setSelector = document.getElementById("setSelector");
const backBtn = document.getElementById("backToMenu");
const card = document.getElementById("flashcard");
const frontDiv = card.querySelector(".card-front");
const backDiv = card.querySelector(".card-back");
const answerDiv = backDiv.querySelector(".answer-text");
const extraDiv = backDiv.querySelector(".extra");
const scoreDiv = document.getElementById("score");

// --- STATE ---
let flashcards = [];
let currentIndex = 0;
let isFlipped = false;
let cardData = {};
let storageKey = "";

// --- Populate menu ---
Object.keys(flashcardSets).forEach(name => {
  const option = document.createElement("option");
  option.value = name;
  option.textContent = name;
  setSelector.appendChild(option);
});

// --- SM-2 card initialization ---
function initializeCard(cardObj) {
  if (!cardData[cardObj.front]) {
    cardData[cardObj.front] = { repetition: 0, interval: 0, ease: 2.5, due: Date.now() };
  }
}

// --- Show card ---
function showCard() {
  const current = flashcards[currentIndex];
  initializeCard(current);

  frontDiv.textContent = current.front;
  answerDiv.textContent = current.back;
  extraDiv.textContent = current.note || "";

  card.classList.remove("flipped");
  isFlipped = false;
  updateScoreDisplay();
}

function updateScoreDisplay() {
  const cardObj = flashcards[currentIndex];
  const data = cardData[cardObj.front];
  scoreDiv.textContent = `Repetition: ${data.repetition}, Interval: ${data.interval} day(s)`;
}

// --- Flip on click ---
card.addEventListener("click", () => {
  card.classList.toggle("flipped");
  isFlipped = !isFlipped;
});

// --- Swipe logic ---
let startX = 0;
card.addEventListener("touchstart", e => startX = e.touches[0].clientX, { passive:true });
card.addEventListener("touchend", e => {
  const deltaX = e.changedTouches[0].clientX - startX;
  if(deltaX>50){ if(!isFlipped){ card.classList.add("flipped"); isFlipped=true } else markCorrect(); }
  else if(deltaX<-50) markIncorrect();
});

// --- SM-2 functions ---
function markCorrect(){
  const cardObj = flashcards[currentIndex];
  const data = cardData[cardObj.front];
  data.repetition += 1;
  if(data.repetition===1) data.interval=1;
  else if(data.repetition===2) data.interval=3;
  else data.interval=Math.round(data.interval*data.ease);
  data.due = Date.now() + data.interval*24*60*60*1000;
  saveSM2();
  nextCard();
}

function markIncorrect(){
  const cardObj = flashcards[currentIndex];
  const data = cardData[cardObj.front];
  data.repetition=0;
  data.interval=1;
  data.due=Date.now()+24*60*60*1000;
  saveSM2();
  nextCard();
}

// --- Next card ---
function nextCard(){
  const now = Date.now();
  const dueCards = flashcards.filter(c=>{ initializeCard(c); return cardData[c.front].due<=now });
  if(dueCards.length===0){ showNoCardsMessage(); return; }
  const randomCard = dueCards[Math.floor(Math.random()*dueCards.length)];
  currentIndex = flashcards.findIndex(c=>c.front===randomCard.front);
  showCard();
}

function showNoCardsMessage(){
  card.classList.remove("flipped");
  frontDiv.textContent="🎉 All done!";
  answerDiv.textContent="No cards due right now.";
  extraDiv.textContent="";
  isFlipped=false;
  scoreDiv.textContent="";
}

function saveSM2(){ localStorage.setItem(storageKey, JSON.stringify(cardData)); }

// --- Load from Google Sheets API ---
async function loadFlashcardsFromSheet(sheetName){
  const apiUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${sheetName}?key=${API_KEY}`;
  const res = await fetch(apiUrl);
  const json = await res.json();
  const rows = json.values || [];
  flashcards = rows.filter(r=>r.length>=2).map(r=>({
    front: r[0].trim(),
    back: r[1].trim(),
    note: r[2]?r[2].trim():""
  }));
  flashcards.forEach(initializeCard);
  if(flashcards.length>0) showCard();
  else alert("No cards found in this sheet.");
}

// --- Menu selection ---
setSelector.addEventListener("change", () => {
  const selectedSet = setSelector.value;
  if(!selectedSet) return;
  storageKey = `sm2Data-${selectedSet}`;
  cardData = JSON.parse(localStorage.getItem(storageKey)) || {};
  menuDiv.classList.add("hidden");
  flashcardArea.classList.remove("hidden");
  loadFlashcardsFromSheet(flashcardSets[selectedSet]);
});

// --- Back to menu ---
backBtn.addEventListener("click", ()=>{
  menuDiv.classList.remove("hidden");
  flashcardArea.classList.add("hidden");
});
</script>

</body>
</html>
