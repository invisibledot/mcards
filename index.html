<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Flip + Swipe</title>
<style>
  body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f0f0; }
  .flashcard { width: 300px; height: 200px; perspective: 1000px; user-select: none; }
  .card-inner { width: 100%; height: 100%; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; font-size: 24px; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
  .flashcard.flipped .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; padding: 20px; }
  .card-back { transform: rotateY(180deg); background: #4caf50; color: white; }
</style>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
</head>
<body>

<div id="flashcard" class="flashcard">
  <div class="card-inner">
    <div class="card-front"></div>
    <div class="card-back"></div>
  </div>
</div>

<div id="score" style="margin-top: 20px; font-size: 18px;"></div>

<script>
// --- FLASHCARDS DATA ---
const flashcards = [
  { front: "Question 1", back: "Answer 1" },
  { front: "Question 2", back: "Answer 2" },
  { front: "Question 3", back: "Answer 3" },
  { front: "Question 4", back: "Answer 4" },
  { front: "Question 5", back: "Answer 5" },
  { front: "Question 6", back: "Answer 6" }
];

let currentIndex = 0;
let isFlipped = false;
let cardData = JSON.parse(localStorage.getItem("sm2Data")) || {};

const card = document.getElementById("flashcard");
const frontDiv = card.querySelector(".card-front");
const backDiv = card.querySelector(".card-back");
const scoreDiv = document.getElementById("score");

function updateScoreDisplay() {
  const card = flashcards[currentIndex];
  const data = cardData[card.front];
  scoreDiv.textContent = `Repetition: ${data.repetition}, Interval: ${data.interval} day(s)`;
}

// --- LOAD FLASHCARDS FROM CSV ---
async function loadFlashcardsFromSheet() {
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTxIepyNc9GUZ3GhE6CLoFE3fSL9-6luVdRvuAmK7m7lC36kSTvHyCf_Sj35-nMHzKv1bXfhLlTqlQo/pub?gid=0&single=true&output=csv";
  const res = await fetch(SHEET_CSV_URL);
  const csvText = await res.text();

  const parsed = Papa.parse(csvText, { header: false, skipEmptyLines: true });
  
  flashcards = parsed.data.map(row => ({
    front: row[0].trim(),
    back: row[1].trim()
  }));

  flashcards.forEach(initializeCard);
  nextCard();

// --- SHOW CARD ---
function showCard() {
  const current = flashcards[currentIndex];

  initializeCard(current);

  frontDiv.textContent = current.front;
  backDiv.textContent = current.back;

  card.classList.remove("flipped");
  isFlipped = false;
}

// --- TAP TO FLIP ---
card.addEventListener("click", () => {
  card.classList.toggle("flipped");
  isFlipped = !isFlipped;
});

// --- SWIPE LOGIC ---
let startX = 0;
card.addEventListener("touchstart", (e) => { startX = e.touches[0].clientX; }, { passive: true });
card.addEventListener("touchend", (e) => {
  const endX = e.changedTouches[0].clientX;
  const deltaX = endX - startX;
  const threshold = 50;

  if (deltaX > threshold) {
    // 👉 Swipe Right
    if (!isFlipped) {
      card.classList.add("flipped");
      isFlipped = true;
    } else {
      markCorrect();
    }
  } else if (deltaX < -threshold) {
    // 👈 Swipe Left → incorrect
    markIncorrect();
  }
});

// --- SCORING ---
function markCorrect() {
  const card = flashcards[currentIndex];
  const data = cardData[card.front];

  data.repetition += 1;

  if (data.repetition === 1) {
    data.interval = 1;
  } else if (data.repetition === 2) {
    data.interval = 3;
  } else {
    data.interval = Math.round(data.interval * data.ease);
  }

  data.due = Date.now() + data.interval * 24 * 60 * 60 * 1000;

  saveSM2();
  nextCard();
}

function markIncorrect() {
  const card = flashcards[currentIndex];
  const data = cardData[card.front];

  data.repetition = 0;
  data.interval = 1;
  data.due = Date.now() + 24 * 60 * 60 * 1000;

  saveSM2();
  nextCard();
}

// --- NEXT CARD ---
function nextCard() {
  const now = Date.now();

  const dueCards = flashcards.filter(card => {
    initializeCard(card);
    return cardData[card.front].due <= now;
  });

  if (dueCards.length === 0) {
    showNoCardsMessage();
    return;
  }

  const randomCard = dueCards[Math.floor(Math.random() * dueCards.length)];
  currentIndex = flashcards.findIndex(c => c.front === randomCard.front);

  showCard();
}

// --- SAVE SCORES ---
function saveScores() {
  localStorage.setItem("flashcardScores", JSON.stringify(scores));
}

// --- SPACED REPETITION ---
function getWeightedRandomIndex() {
  const weights = flashcards.map(card => {
    const score = scores[card.front] || 0;

    // Convert score into weight
    // Lower score = higher weight
    // Add 5 to avoid zero/negative weight
    return Math.max(1, 5 - score);
  });

  const totalWeight = weights.reduce((sum, w) => sum + w, 0);
  let random = Math.random() * totalWeight;

  for (let i = 0; i < weights.length; i++) {
    if (random < weights[i]) {
      return i;
    }
    random -= weights[i];
  }

  return 0; // fallback
}

// --- INITIALIZE CARD DATA ---
function initializeCard(card) {
  if (!cardData[card.front]) {
    cardData[card.front] = {
      repetition: 0,
      interval: 0,
      ease: 2.5,
      due: Date.now()
    };
  }
}

// --- SAVE FUNCTION ---
function saveSM2() {
  localStorage.setItem("sm2Data", JSON.stringify(cardData));
}

// --- NO CARDS MESSAGE ---
function showNoCardsMessage() {
  card.classList.remove("flipped");
  frontDiv.textContent = "🎉 All done!";
  backDiv.textContent = "No cards due right now.";
  isFlipped = false;
}

// --- INITIAL LOAD ---
loadFlashcardsFromSheet();
</script>

</body>
</html>
