<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Multi-Set + SM-2</title>
<style>
  body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; margin: 0; padding: 20px; background: #f0f0f0; height: 100vh; }
  .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
  .screen.active { display: flex; }
  .flashcard { width: 300px; height: 200px; perspective: 1000px; user-select: none; margin-top: 20px; }
  .card-inner { width: 100%; height: 100%; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; font-size: 24px; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
  .flashcard.flipped .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
  .card-back { transform: rotateY(180deg); background: #4caf50; color: white; }
  .extra { margin-top:10px; font-size:16px; color:#fff; min-height:20px; text-align:center; }
  button { font-size: 16px; padding: 5px 10px; margin: 10px; }
  select { font-size: 16px; padding: 5px; margin-top: 20px; }
  #score { margin-top: 10px; font-size: 16px; color:#333; }
</style>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
</head>
<body>

<!-- MENU SCREEN -->
<div id="menuScreen" class="screen active">
  <h2>Select Flashcard Set:</h2>
  <select id="setSelector"></select>
  <button id="startBtn">Start</button>
</div>

<!-- FLASHCARD SCREEN -->
<div id="cardScreen" class="screen">
  <button id="backBtn">← Back to Menu</button>
  <div id="flashcard" class="flashcard">
    <div class="card-inner">
      <div class="card-front"></div>
      <div class="card-back">
        <div class="answer-text"></div>
        <div class="extra"></div>
      </div>
    </div>
  </div>
  <div id="score"></div>
</div>

<script>
const flashcardSets = {
  "Swedish Verbs A1": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTxIepyNc9GUZ3GhE6CLoFE3fSL9-6luVdRvuAmK7m7lC36kSTvHyCf_Sj35-nMHzKv1bXfhLlTqlQo/pub?gid=0&single=true&output=csv",
  "Swedish Preterite A1": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKvDFc1S0JNQtS7KzkT8oXsV749TK42MLQ5zTh8aqheGEcWdxk6MXkqxpfPmZraPGGjYs7njCoUl-2/pub?gid=0&single=true&output=csv"
};

// DOM elements
const menuScreen = document.getElementById("menuScreen");
const cardScreen = document.getElementById("cardScreen");
const setSelector = document.getElementById("setSelector");
const startBtn = document.getElementById("startBtn");
const backBtn = document.getElementById("backBtn");
const card = document.getElementById("flashcard");
const frontDiv = card.querySelector(".card-front");
const backDiv = card.querySelector(".card-back");
const answerDiv = backDiv.querySelector(".answer-text");
const extraDiv = backDiv.querySelector(".extra");
const scoreDiv = document.getElementById("score");

// Populate set selector
Object.keys(flashcardSets).forEach(name => {
  const option = document.createElement("option");
  option.value = name;
  option.textContent = name;
  setSelector.appendChild(option);
});

// --- STATE ---
let flashcards = [];
let currentIndex = 0;
let isFlipped = false;
let cardData = {};
let storageKey = "";

// --- SCREEN SWITCH ---
function showMenu() {
  cardScreen.classList.remove("active");
  menuScreen.classList.add("active");
}

function showCards() {
  menuScreen.classList.remove("active");
  cardScreen.classList.add("active");
}

// --- LOAD SHEET ---
async function loadFlashcardsFromSheet(url) {
  const res = await fetch(url);
  const csvText = await res.text();
  const parsed = Papa.parse(csvText, { header: false, skipEmptyLines: true });

  flashcards = parsed.data.map(row => ({
    front: row[0].trim(),
    back: row[1].trim(),
    note: row[2] ? row[2].trim() : ""
  }));

  flashcards.forEach(initializeCard);
  nextCard();
}

// --- SHOW CARD ---
function showCard() {
  const current = flashcards[currentIndex];
  initializeCard(current);

  frontDiv.textContent = current.front;
  answerDiv.textContent = current.back;
  extraDiv.textContent = current.note || "";

  card.classList.remove("flipped");
  isFlipped = false;
  updateScoreDisplay();
}

// --- TAP TO FLIP ---
card.addEventListener("click", () => {
  card.classList.toggle("flipped");
  isFlipped = !isFlipped;
});

// --- SWIPE LOGIC ---
let startX = 0;
card.addEventListener("touchstart", (e) => { startX = e.touches[0].clientX; }, { passive: true });
card.addEventListener("touchend", (e) => {
  const endX = e.changedTouches[0].clientX;
  const deltaX = endX - startX;
  const threshold = 50;

  if (deltaX > threshold) {
    if (!isFlipped) { card.classList.add("flipped'); isFlipped=true;}
    else { markCorrect(); }
  } else if (deltaX < -threshold) { markIncorrect(); }
});

// --- SM-2 FUNCTIONS ---
function markCorrect() {
  const cardObj = flashcards[currentIndex];
  const data = cardData[cardObj.front];
  data.repetition += 1;
  if (data.repetition === 1) data.interval = 1;
  else if (data.repetition === 2) data.interval = 3;
  else data.interval = Math.round(data.interval * data.ease);
  data.due = Date.now() + data.interval*24*60*60*1000;
  saveSM2();
  nextCard();
}

function markIncorrect() {
  const cardObj = flashcards[currentIndex];
  const data = cardData[cardObj.front];
  data.repetition = 0;
  data.interval = 1;
  data.due = Date.now() + 24*60*60*1000;
  saveSM2();
  nextCard();
}

// --- NEXT CARD ---
function nextCard() {
  const now = Date.now();
  const dueCards = flashcards.filter(c => { initializeCard(c); return cardData[c.front].due <= now; });

  if (dueCards.length === 0) {
    showNoCardsMessage();
    return;
  }

  const randomCard = dueCards[Math.floor(Math.random() * dueCards.length)];
  currentIndex = flashcards.findIndex(c => c.front === randomCard.front);
  showCard();
}

// --- NO CARDS MESSAGE ---
function showNoCardsMessage() {
  card.classList.remove("flipped");
  frontDiv.textContent = "🎉 All done!";
  answerDiv.textContent = "No cards due right now.";
  extraDiv.textContent = "";
  isFlipped = false;
  scoreDiv.textContent = "";
}

// --- SAVE / INITIALIZE ---
function saveSM2() {
  localStorage.setItem(storageKey, JSON.stringify(cardData));
}

function initializeCard(cardObj) {
  if (!cardData[cardObj.front]) {
    cardData[cardObj.front] = { repetition:0, interval:0, ease:2.5, due:Date.now() };
  }
}

function updateScoreDisplay() {
  const cardObj = flashcards[currentIndex];
  const data = cardData[cardObj.front];
  scoreDiv.textContent = `Repetition: ${data.repetition}, Interval: ${data.interval} day(s)`;
}

// --- BUTTON EVENTS ---
startBtn.addEventListener("click", () => {
  const selectedSet = setSelector.value;
  storageKey = `sm2Data-${selectedSet}`;
  cardData = JSON.parse(localStorage.getItem(storageKey)) || {};
  showCards();
  loadFlashcardsFromSheet(flashcardSets[selectedSet]);
});

backBtn.addEventListener("click", () => {
  saveSM2();
  showMenu();
});

// --- INITIAL LOAD ---
showMenu();
</script>

</body>
</html>
